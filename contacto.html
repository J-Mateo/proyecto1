  <body>
    <header class="header-main">
      <nav class="nav-container">
        <a href="./index.html" class="logo-link">
          <img
            src="https://res.cloudinary.com/dnfweiifg/image/upload/v1773328468/logojm_ucmpa9.png"

        <button class="hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </button>
      </nav>
    </header>
    <main> 
      <h1>Contacto</h1>
      <p>
        Rellena el formulario si tienes alguna propuesta de colaboración o
        vacante y me pondré en contacto contigo lo antes posible.
      </p>
      <form action="#">
        <fieldset class="Datos-personales">
          <legend>Datos personales</legend>
          <div>
            <label for="name">Nombre</label>
            <input
              type="text"
              id="name"
              name="nombre"
              placeholder="Escribe tu nombre"
              required
            />
          </div>
          <div>
            <label for="email">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Correo electrónico"
              required
            />
          </div>
        </fieldset>
        <fieldset class="información">
          <legend>Información</legend>
          <div>
            <label for="asunto">Asunto</label>
            <input
              type="text"
              id="asunto"
              name="asunto"
              placeholder="asunto"
              required
            />
          </div>
          <div>
            <label for="mensaje">Mensaje </label>
            <textarea
              name="mensaje"
              id="mensaje"
              cols="30"
              rows="5"
              required
            ></textarea>
          </div>
        </fieldset>
        <div>
          <button type="submit">Enviar</button>
          <button type="reset">Borrar</button>
        </div>
      </form>
    </main>
    <footer>
      <p>&copy; 2026 Jessica Mateo - Full Stack Developer en proceso</p>
    </footer>
  </body>
