<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio de Jessica Mateo Full Stack Developer aprendiendo en The Bridge." />
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/styles.css" />

  <title>Jessica Mateo | Mi portfolio - Sprint 1</title>
  <link rel="icon" href="https://res.cloudinary.com/dnfweiifg/image/upload/v1773307269/favicon_gqcend.ico"
    type="image/x-icon" />
</head>

<body>

  <header class="header-main" id="main-header">
  </header>
  <main>
    <h1>Contacto</h1>
    <p>
      Rellena el formulario si tienes alguna propuesta de colaboración o
      vacante y me pondré en contacto contigo lo antes posible.
    </p>
    <form action="#">
      <fieldset class="Datos-personales">
        <legend>Datos personales</legend>
        <div>
          <label for="name">Nombre</label>
          <input type="text" id="name" name="nombre" placeholder="Escribe tu nombre" required />
        </div>
        <div>
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" name="email" placeholder="Correo electrónico" required />
        </div>
      </fieldset>
      <fieldset class="información">
        <legend>Información</legend>
        <div>
          <label for="asunto">Asunto</label>
          <input type="text" id="asunto" name="asunto" placeholder="asunto" required />
        </div>
        <div>
          <label for="mensaje">Mensaje </label>
          <textarea name="mensaje" id="mensaje" cols="30" rows="5" required></textarea>
        </div>
      </fieldset>
      <div>
        <button type="submit">Enviar</button>
        <button type="reset">Borrar</button>
      </div>
    </form>
  </main>
  <footer id="main-footer"></footer>
  <script type="module" src="./js/main.js"></script>
</body>

</html>
